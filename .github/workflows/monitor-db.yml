name: Monitor Database Connections

on:
  workflow_dispatch: # Solo ejecución manual (sin schedule)
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Database Health
        run: |
          # Produzione: dominio canonico del sito (evita placeholder tu-dominio.com)
          response=$(curl -sfL "https://www.gibravo.it/api/health/database") || {
            echo "::error::Health endpoint non raggiungibile o HTTP errore"
            exit 1
          }
          echo "$response" | jq '.'
          
          # Extraer métricas
          total=$(echo "$response" | jq -r '.metrics.total_connections')
          active=$(echo "$response" | jq -r '.metrics.active_connections')
          
          # Mostrar resultados
          echo "📊 Total connections: $total"
          echo "⚡ Active connections: $active"
          
          # Alerta si hay muchas conexiones
          if [ "$total" -gt 4 ]; then
            echo "⚠️ WARNING: Database connections are high ($total/5)"
          fi

